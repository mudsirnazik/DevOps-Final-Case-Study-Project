services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://backend:5000
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    restart: always